skill:
  id: flair-docker-deployment
  version: "1.0"
  name: "Docker & Container Deployment"
  description: >
    Governs Dockerfile design, multi-stage builds, docker-compose.dev conventions,
    container security hardening and non-root execution for all FLAIR repos.
  applies_to:
    - flair-agent
    - flair-core
    - flair-ui
  loaded_by:
    - DevSecOps_Expert
    - Dev_Agent

---

dockerfile_conventions:

  multi_stage_go: |
    # syntax=docker/dockerfile:1
    # Stage 1: Build
    FROM golang:1.22-alpine AS builder
    WORKDIR /build
    COPY go.mod go.sum ./
    RUN go mod download
    COPY . .
    RUN CGO_ENABLED=0 GOOS=linux go build \
        -ldflags="-s -w -X main.version=${VERSION}" \
        -o /bin/flair-core ./cmd/server

    # Stage 2: Runtime — minimal image
    FROM gcr.io/distroless/static-debian12:nonroot
    COPY --from=builder /bin/flair-core /flair-core
    USER nonroot:nonroot
    EXPOSE 8080
    ENTRYPOINT ["/flair-core"]

  multi_stage_angular: |
    # Stage 1: Build Angular
    FROM node:20-alpine AS builder
    WORKDIR /app
    COPY package*.json ./
    RUN npm ci --ignore-scripts
    COPY . .
    RUN npm run build --configuration=production

    # Stage 2: Serve with nginx
    FROM nginx:alpine-slim
    COPY --from=builder /app/dist/flair-ui /usr/share/nginx/html
    COPY nginx.conf /etc/nginx/conf.d/default.conf
    RUN chown -R nginx:nginx /usr/share/nginx/html
    USER nginx
    EXPOSE 80

  rules:
    - "Always multi-stage — never ship build tools in the runtime image"
    - "Runtime image: distroless for Go, nginx-alpine-slim for Angular"
    - "USER nonroot (Go) or USER nginx (Angular) — never root"
    - "No secrets in Dockerfile — use build args for version only"
    - "gate_impact: Gate 3 score -15 if container runs as root"

---

container_security:

  non_root: |
    # All containers run as non-root
    # flair-agent needs capabilities — granted explicitly, not via root
    security_context:
      runAsNonRoot: true
      runAsUser: 65534  # nobody
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
        add: [NET_ADMIN, SYS_PTRACE]  # flair-agent only
      readOnlyRootFilesystem: true
      seccompProfile:
        type: RuntimeDefault

  image_scanning: |
    # In CI pipeline — after build, before publish
    - name: Scan Docker image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ghcr.io/flair-security/${{ env.IMAGE_NAME }}:${{ env.TAG }}
        format: sarif
        severity: CRITICAL,HIGH
        exit-code: 1  # Fail CI on CRITICAL or HIGH CVEs

---

docker_compose_dev:

  flair_core: |
    # flair-core/docker-compose.dev.yml
    services:
      db:
        image: apache/age:latest
        environment:
          POSTGRES_DB: flair_dev
          POSTGRES_PASSWORD: dev_password
        ports: ["5432:5432"]
        volumes: ["pgdata:/var/lib/postgresql/data"]
        healthcheck:
          test: ["CMD", "pg_isready", "-U", "postgres"]
          interval: 5s
          retries: 5

      core:
        build:
          context: .
          target: builder  # Build stage — includes dev tools
        command: ["air", "-c", ".air.toml"]  # Hot reload via air
        environment:
          DATABASE_URL: postgres://postgres:dev_password@db:5432/flair_dev?sslmode=disable
          LOG_LEVEL: DEBUG
          OIDC_ISSUER: http://localhost:4011  # Local Dex for dev
        ports: ["8080:8080"]
        depends_on:
          db: { condition: service_healthy }
        volumes:
          - .:/app  # Mount source for hot reload

      dex:  # Local OIDC provider for dev
        image: dexidp/dex:latest
        ports: ["4011:5556"]
        volumes: ["./dev/dex.yaml:/etc/dex/config.yaml"]

    volumes:
      pgdata:

  flair_ui: |
    # flair-ui/docker-compose.dev.yml
    services:
      ui:
        build:
          context: .
          target: builder
        command: ["ng", "serve", "--host", "0.0.0.0", "--poll", "2000"]
        ports: ["4200:4200"]
        environment:
          API_URL: http://localhost:8080
        volumes:
          - .:/app
          - /app/node_modules  # Prevent host node_modules override

  flair_agent: |
    # flair-agent/docker-compose.dev.yml
    services:
      agent:
        build: .
        privileged: true           # Required for eBPF in Docker Desktop VM
        network_mode: host         # Required for full network capture
        cap_add: [NET_ADMIN, SYS_PTRACE]
        environment:
          FLAIR_CORE_URL: http://localhost:8080
          LOG_LEVEL: DEBUG
          AGENT_PLATFORM: linux
        volumes:
          - /sys/fs/bpf:/sys/fs/bpf  # BPF filesystem
          - /proc:/host/proc:ro       # For process attribution

  rules:
    - "dev compose files named docker-compose.dev.yml — never override production"
    - "Production compose files never committed to repo — use Helm/Terraform for production"
    - "dev volumes mount source code for hot reload — not in production images"
