skill:
  id: flair-documentation
  version: "1.0"
  name: "Documentation Conventions"
  description: >
    Governs Docusaurus structure, OpenAPI generation, ADR format,
    GoDoc conventions and the documentation AC challenge.
    Documentation is a first-class deliverable — not an afterthought.
  applies_to:
    - flair-docs
    - flair-core   # GoDoc + OpenAPI
    - flair-agent  # GoDoc
  loaded_by:
    - Documentation_Expert
    - Dev_Agent

---

docusaurus:

  structure: |
    flair-docs/
      docs/
        getting-started/
          installation.md
          first-flow.md
          troubleshooting.md
        architecture/
          overview.md
          flow-contract.md
          graph-model.md
          security-scoring.md
        deployment/
          docker.md
          kubernetes.md
          terraform-aws.md
          terraform-azure.md
          terraform-gcp.md
        api-reference/        # Generated from OpenAPI spec — do not edit manually
          flows.md
          services.md
          agents.md
          webhooks.md
        guides/
          nis2-compliance.md
          dora-evidence.md
          integrating-with-siem.md
        stories/              # US story files
          us-{id}.md
      blog/                   # Release notes and announcements
      openapi.json            # Generated by CI from flair-core annotations
      sidebars.js

  rules:
    - "Every public API endpoint documented in OpenAPI — generated, never hand-written"
    - "Every configuration value documented with type, default, description and example"
    - "Every deployment step documented with copy-paste commands — not pseudocode"
    - "Screenshots updated on every UI change — no stale screenshots"
    - "gate_impact: Gate 3 score -5 per new public endpoint missing OpenAPI annotation"

---

adr:

  format: |
    # ADR-{id} — {title}

    **Date**: YYYY-MM-DD
    **Status**: Proposed | Accepted | Deprecated | Superseded by ADR-{id}
    **Deciders**: {agent roles who participated}

    ## Context

    {What is the issue we are seeing that motivates this decision?}

    ## Decision

    {What is the change we are proposing or have decided?}

    ## Alternatives considered

    | Option | Pros | Cons |
    |---|---|---|
    | {Option A} | ... | ... |
    | {Option B} | ... | ... |

    ## Consequences

    {What becomes easier or harder as a result of this decision?}

    ## Relation to FLAIR non-negotiables

    {Does this decision affect any non-negotiable? If so, how is it respected?}

  naming: "docs/ADR/adr-{id}-{kebab-case-title}.md"
  rule: >
    Any decision that affects the Flow contract, GraphStore interface,
    AuthProvider interface, or IngestQueue interface requires an ADR.
    ADRs are immutable — supersede, never edit.

---

godoc:

  rule: "Every exported type, function, method and package has GoDoc"

  package_doc: |
    // Package collector provides the Collector interface and its implementations
    // for capturing network flows on Linux (eBPF), Windows (ETW) and fallback (pcap).
    //
    // The primary interface is Collector — instantiate via NewCollector(cfg).
    // All implementations emit *domain.Flow values on the channel returned by Flows().
    package collector

  function_doc: |
    // NewEBPFCollector creates a new eBPF-based flow collector.
    // It requires CAP_NET_ADMIN and CAP_SYS_PTRACE capabilities.
    // The collector attaches TC egress/ingress hooks and emits flows via a ring buffer.
    //
    // Returns an error if the kernel version is below 4.18,
    // if required capabilities are missing, or if the eBPF program fails to load.
    func NewEBPFCollector(cfg EBPFConfig) (*EBPFCollector, error)

  example_doc: |
    func ExampleNewCollector() {
        cfg := collector.Config{Platform: "linux"}
        c, err := collector.NewCollector(cfg)
        if err != nil {
            log.Fatal(err)
        }
        defer c.Close()

        ctx, cancel := context.WithTimeout(context.Background(), 10*time.Second)
        defer cancel()

        c.Start(ctx)
        for flow := range c.Flows() {
            fmt.Printf("Flow: %s→%s %s\n", flow.SrcIP, flow.DstIP, flow.Protocol)
        }
    }

---

changelog:

  format: "Keep a Changelog (keepachangelog.com) — generated by Semantic Release"
  rule: >
    CHANGELOG.md is generated automatically — never edited manually.
    The quality of the changelog depends entirely on commit message quality after rebase.

  entry_format: |
    ## [1.2.0] - 2026-06-18
    ### Added
    - feat(agent): detect gRPC protocol via port 443 DPI (#42)
    ### Fixed
    - fix(core): cursor pagination returns correct next page on concurrent inserts (#43)
    ### Security
    - security(core): enforce TLS 1.3 minimum on agent↔core connections (#44)

---

documentation_ac_challenge:

  protocol: >
    The Documentation Expert reviews every US to ensure documentation
    is treated as a deliverable, not an afterthought.

  questions:
    q1_api_doc: |
      Does this US add or modify a public API endpoint?
      If yes: is there an AC verifying the OpenAPI annotation is present and complete?
      Expected AC: "Given new endpoint, when /openapi.json is fetched, then endpoint appears
      with summary, description, parameters, response schemas and security tag."

    q2_config_doc: |
      Does this US add a new configuration parameter?
      If yes: is there an AC verifying the parameter is documented in docs/deployment/?
      Expected AC: "Given new config parameter {name}, when deployment guide is read,
      then type, default, description and example are present."

    q3_user_facing_change: |
      Does this US change user-facing behaviour in flair-ui?
      If yes: is there an AC for updating the relevant guide in flair-docs?

    q4_adr_required: |
      Does this US affect the Flow contract, GraphStore, AuthProvider or IngestQueue?
      If yes: is an ADR created before implementation starts?
