name: Orchestrator

on:
  schedule:
    - cron: "0 */6 * * *"   # Every 6 hours
  workflow_dispatch:
    inputs:
      mode:
        description: "full (backlog+dispatch) | status (report only)"
        required: false
        default: "full"
        type: choice
        options: [full, status]

jobs:
  orchestrate:
    name: Run Orchestrator cycle
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout .github repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python (for context builder)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Run Orchestrator (Claude Code)
        uses: anthropic/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GH_TOKEN_PROJECTS }}
          prompt_file: ".project/prompts/orchestrator.md"
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep"
          max_turns: 60
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_PROJECTS }}
          ORCHESTRATOR_MODE: ${{ inputs.mode || 'full' }}
          GITHUB_ORG: flair-security
          GITHUB_PROJECT_NUMBER: "1"
